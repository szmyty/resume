name: Release Paper

on:
  push:
    tags:
      - "v*.*.*"
      - "reflector-v*.*.*"

  workflow_dispatch:
    inputs:
      paper:
        description: "Paper directory"
        required: true
        default: "paper"

      tag:
        description: "Release tag"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Paper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine paper metadata
        id: vars
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PAPER_DIR="${{ github.event.inputs.paper }}"
            TAG="${{ github.event.inputs.tag }}"
            PAPER_NAME="$(basename "${PAPER_DIR}")"
            VERSION="${TAG}"
          else
            TAG="${{ github.ref_name }}"

            if [[ "${TAG}" =~ ^([a-zA-Z0-9_-]+)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              PAPER_NAME="${BASH_REMATCH[1]}"
              VERSION="v${BASH_REMATCH[2]}"
              PAPER_DIR="paper"
            elif [[ "${TAG}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              PAPER_NAME="reflector"
              VERSION="${TAG}"
              PAPER_DIR="paper"
            else
              echo "Unsupported release tag format: ${TAG}" >&2
              exit 1
            fi
          fi

          VERSION_NO_V="${VERSION#v}"
          RELEASE_DIR="release/${PAPER_NAME}-${TAG}"
          PDF_PATH="${PAPER_DIR}/.cache/out/paper.pdf"
          PDF_ASSET="${RELEASE_DIR}/${PAPER_NAME}.pdf"
          RELEASE_BUNDLE="release/${PAPER_NAME}-${TAG}.zip"
          ARXIV_BUNDLE="release/${PAPER_NAME}-arxiv-${TAG}.zip"
          MANIFEST_PATH="${RELEASE_DIR}/manifest.json"
          RELEASE_MANIFEST_ASSET="${RELEASE_DIR}/release-manifest.json"
          PUBLICATION_METADATA_ASSET="${RELEASE_DIR}/publication.json"
          CHECKSUMS_PATH="${RELEASE_DIR}/checksums.txt"
          ZENODO_REPORT_PATH="${RELEASE_DIR}/zenodo-readiness.md"
          RELEASE_NOTES_PATH="${RELEASE_DIR}/release-notes.md"
          MAGAZINE_PDF_SOURCE="magazine/dist/reflector-magazine.pdf"
          MAGAZINE_PRINT_PDF_SOURCE="magazine/dist/reflector-magazine-print.pdf"
          MAGAZINE_PDF_ASSET="${RELEASE_DIR}/reflector-magazine.pdf"
          MAGAZINE_PRINT_PDF_ASSET="${RELEASE_DIR}/reflector-magazine-print.pdf"

          echo "paper_dir=${PAPER_DIR}" >> "$GITHUB_OUTPUT"
          echo "paper_name=${PAPER_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION_NO_V}" >> "$GITHUB_OUTPUT"
          echo "release_dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"
          echo "release_bundle=${RELEASE_BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "arxiv_bundle=${ARXIV_BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "manifest_path=${MANIFEST_PATH}" >> "$GITHUB_OUTPUT"
          echo "release_manifest_asset=${RELEASE_MANIFEST_ASSET}" >> "$GITHUB_OUTPUT"
          echo "publication_metadata_asset=${PUBLICATION_METADATA_ASSET}" >> "$GITHUB_OUTPUT"
          echo "checksums_path=${CHECKSUMS_PATH}" >> "$GITHUB_OUTPUT"
          echo "zenodo_report_path=${ZENODO_REPORT_PATH}" >> "$GITHUB_OUTPUT"
          echo "release_notes_path=${RELEASE_NOTES_PATH}" >> "$GITHUB_OUTPUT"
          echo "release_name=${PAPER_NAME} ${TAG}" >> "$GITHUB_OUTPUT"
          echo "pdf_path=${PDF_PATH}" >> "$GITHUB_OUTPUT"
          echo "pdf_asset=${PDF_ASSET}" >> "$GITHUB_OUTPUT"
          echo "magazine_pdf_source=${MAGAZINE_PDF_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "magazine_print_pdf_source=${MAGAZINE_PRINT_PDF_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "magazine_pdf_asset=${MAGAZINE_PDF_ASSET}" >> "$GITHUB_OUTPUT"
          echo "magazine_print_pdf_asset=${MAGAZINE_PRINT_PDF_ASSET}" >> "$GITHUB_OUTPUT"

      - name: Validate changelog includes release version
        run: |
          set -euo pipefail

          VERSION_NO_V="${{ steps.vars.outputs.version_no_v }}"

          if [[ ! -f CHANGELOG.md ]]; then
            echo "CHANGELOG.md is required for releases." >&2
            exit 1
          fi

          if ! grep -Eq "^## \\[${VERSION_NO_V}\\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version ${VERSION_NO_V}." >&2
            exit 1
          fi

      - name: Validate VERSION metadata
        run: |
          set -euo pipefail

          VERSION_NO_V="${{ steps.vars.outputs.version_no_v }}"

          if [[ ! -f VERSION ]]; then
            echo "VERSION file is required for releases." >&2
            exit 1
          fi

          VERSION_FILE_VALUE="$(tr -d '[:space:]' < VERSION)"
          if [[ "${VERSION_FILE_VALUE}" != "${VERSION_NO_V}" ]]; then
            echo "VERSION (${VERSION_FILE_VALUE}) does not match release tag version (${VERSION_NO_V})." >&2
            exit 1
          fi

      - name: Validate release lifecycle synchronization
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml>=6.0
          python scripts/validate-metadata.py
          python scripts/validate-release-lifecycle.py

      - name: Build LaTeX PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: ${{ steps.vars.outputs.paper_dir }}
          extra_system_packages: "biber"
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -synctex=1
            -file-line-error
            -shell-escape
            -f
            -gg
            -cd
            -r
            ../.latexmkrc

      - name: Print LaTeX diagnostics on failure
        if: failure()
        run: ./scripts/print-latex-diagnostics.sh "${{ steps.vars.outputs.paper_dir }}"

      - name: Build reflector magazine PDF (digital)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tex/magazine.tex
          working_directory: magazine
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -file-line-error
            -f
            -gg
            -cd
            -r
            tex/.latexmkrc

      - name: Build reflector magazine PDF (print)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tex/magazine-print.tex
          working_directory: magazine
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -file-line-error
            -f
            -gg
            -cd
            -r
            tex/.latexmkrc

      - name: Copy magazine PDFs to dist
        run: |
          set -euo pipefail
          mkdir -p magazine/dist
          cp magazine/.cache/out/magazine.pdf magazine/dist/reflector-magazine.pdf
          cp magazine/.cache/out/magazine-print.pdf magazine/dist/reflector-magazine-print.pdf
          echo "Built: magazine/dist/reflector-magazine.pdf"
          echo "Built: magazine/dist/reflector-magazine-print.pdf"

      - name: Assemble release artifacts
        run: |
          set -euo pipefail

          PAPER_DIR="${{ steps.vars.outputs.paper_dir }}"
          RELEASE_DIR="${{ steps.vars.outputs.release_dir }}"
          SOURCE_DIR="${RELEASE_DIR}/source"
          ARXIV_DIR="${RELEASE_DIR}/arxiv"
          PDF_PATH="${{ steps.vars.outputs.pdf_path }}"
          PDF_ASSET="${{ steps.vars.outputs.pdf_asset }}"
          MAGAZINE_PDF_SOURCE="${{ steps.vars.outputs.magazine_pdf_source }}"
          MAGAZINE_PRINT_PDF_SOURCE="${{ steps.vars.outputs.magazine_print_pdf_source }}"
          MAGAZINE_PDF_ASSET="${{ steps.vars.outputs.magazine_pdf_asset }}"
          MAGAZINE_PRINT_PDF_ASSET="${{ steps.vars.outputs.magazine_print_pdf_asset }}"
          RELEASE_MANIFEST_ASSET="${{ steps.vars.outputs.release_manifest_asset }}"
          PUBLICATION_METADATA_ASSET="${{ steps.vars.outputs.publication_metadata_asset }}"

          mkdir --parents "${SOURCE_DIR}" "${ARXIV_DIR}"

          cp "${PDF_PATH}" "${PDF_ASSET}"
          cp "${MAGAZINE_PDF_SOURCE}" "${MAGAZINE_PDF_ASSET}"
          cp "${MAGAZINE_PRINT_PDF_SOURCE}" "${MAGAZINE_PRINT_PDF_ASSET}"
          cp "release-manifest.json" "${RELEASE_MANIFEST_ASSET}"
          cp "publication.json" "${PUBLICATION_METADATA_ASSET}"

          for file in "paper.tex" "references.bib"; do
            if [[ -f "${PAPER_DIR}/${file}" ]]; then
              cp "${PAPER_DIR}/${file}" "${SOURCE_DIR}/${file}"
              cp "${PAPER_DIR}/${file}" "${ARXIV_DIR}/${file}"
            fi
          done

          if [[ -f ".latexmkrc" ]]; then
            cp ".latexmkrc" "${SOURCE_DIR}/.latexmkrc"
            cp ".latexmkrc" "${ARXIV_DIR}/.latexmkrc"
          fi

          for directory in "sections" "figures" "diagrams" "assets" "references"; do
            if [[ -d "${PAPER_DIR}/${directory}" ]]; then
              cp --recursive "${PAPER_DIR}/${directory}" "${SOURCE_DIR}/${directory}"
              cp --recursive "${PAPER_DIR}/${directory}" "${ARXIV_DIR}/${directory}"
            fi
          done

      - name: Generate release notes from changelog
        run: |
          set -euo pipefail

          VERSION_NO_V="${{ steps.vars.outputs.version_no_v }}"
          RELEASE_NOTES_PATH="${{ steps.vars.outputs.release_notes_path }}"

          mkdir --parents "$(dirname "${RELEASE_NOTES_PATH}")"

          {
            printf "## %s\n\n" "${{ steps.vars.outputs.tag }}"
            awk -v version="${VERSION_NO_V}" '
              $0 ~ "^## \\[" version "\\]" {capture=1; next}
              $0 ~ "^## \\[" && capture==1 {exit}
              capture==1 {print}
            ' CHANGELOG.md
          } > "${RELEASE_NOTES_PATH}"

      - name: Package release and arXiv bundles
        run: |
          set -euo pipefail

          RELEASE_DIR="${{ steps.vars.outputs.release_dir }}"
          PAPER_NAME="${{ steps.vars.outputs.paper_name }}"
          TAG="${{ steps.vars.outputs.tag }}"
          RELEASE_BUNDLE="${{ steps.vars.outputs.release_bundle }}"
          ARXIV_BUNDLE="${{ steps.vars.outputs.arxiv_bundle }}"

          (
            cd "$(dirname "${RELEASE_DIR}")"
            zip -X -r "$(basename "${RELEASE_BUNDLE}")" "$(basename "${RELEASE_DIR}")"
          )

          (
            cd "${RELEASE_DIR}"
            zip -X -r "../$(basename "${ARXIV_BUNDLE}")" "arxiv"
          )

      - name: Generate release manifest
        run: |
          set -euo pipefail

          PAPER_NAME="${{ steps.vars.outputs.paper_name }}"
          TAG="${{ steps.vars.outputs.tag }}"
          PDF_ASSET="${{ steps.vars.outputs.pdf_asset }}"
          RELEASE_BUNDLE="${{ steps.vars.outputs.release_bundle }}"
          ARXIV_BUNDLE="${{ steps.vars.outputs.arxiv_bundle }}"
          MANIFEST_PATH="${{ steps.vars.outputs.manifest_path }}"
          MAGAZINE_PDF_ASSET="${{ steps.vars.outputs.magazine_pdf_asset }}"
          MAGAZINE_PRINT_PDF_ASSET="${{ steps.vars.outputs.magazine_print_pdf_asset }}"

          PDF_SHA256="$(sha256sum "${PDF_ASSET}" | awk '{print $1}')"
          RELEASE_SHA256="$(sha256sum "${RELEASE_BUNDLE}" | awk '{print $1}')"
          ARXIV_SHA256="$(sha256sum "${ARXIV_BUNDLE}" | awk '{print $1}')"
          MAGAZINE_PDF_SHA256="$(sha256sum "${MAGAZINE_PDF_ASSET}" | awk '{print $1}')"
          MAGAZINE_PRINT_PDF_SHA256="$(sha256sum "${MAGAZINE_PRINT_PDF_ASSET}" | awk '{print $1}')"

          GENERATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          PAPER_NAME="${PAPER_NAME}" \
          TAG="${TAG}" \
          GITHUB_SHA="${GITHUB_SHA}" \
          GENERATED_AT="${GENERATED_AT}" \
          PDF_ASSET="${PDF_ASSET}" \
          PDF_SHA256="${PDF_SHA256}" \
          RELEASE_BUNDLE="${RELEASE_BUNDLE}" \
          RELEASE_SHA256="${RELEASE_SHA256}" \
          ARXIV_BUNDLE="${ARXIV_BUNDLE}" \
          ARXIV_SHA256="${ARXIV_SHA256}" \
          MAGAZINE_PDF_ASSET="${MAGAZINE_PDF_ASSET}" \
          MAGAZINE_PDF_SHA256="${MAGAZINE_PDF_SHA256}" \
          MAGAZINE_PRINT_PDF_ASSET="${MAGAZINE_PRINT_PDF_ASSET}" \
          MAGAZINE_PRINT_PDF_SHA256="${MAGAZINE_PRINT_PDF_SHA256}" \
          MANIFEST_PATH="${MANIFEST_PATH}" \
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = {
              "paper": os.environ["PAPER_NAME"],
              "tag": os.environ["TAG"],
              "commit": os.environ["GITHUB_SHA"],
              "generated_at": os.environ["GENERATED_AT"],
              "artifacts": {
                  "pdf": {
                      "path": os.environ["PDF_ASSET"],
                      "sha256": os.environ["PDF_SHA256"],
                  },
                  "magazine_pdf": {
                      "path": os.environ["MAGAZINE_PDF_ASSET"],
                      "sha256": os.environ["MAGAZINE_PDF_SHA256"],
                  },
                  "magazine_print_pdf": {
                      "path": os.environ["MAGAZINE_PRINT_PDF_ASSET"],
                      "sha256": os.environ["MAGAZINE_PRINT_PDF_SHA256"],
                  },
                  "release_bundle": {
                      "path": os.environ["RELEASE_BUNDLE"],
                      "sha256": os.environ["RELEASE_SHA256"],
                  },
                  "arxiv_bundle": {
                      "path": os.environ["ARXIV_BUNDLE"],
                      "sha256": os.environ["ARXIV_SHA256"],
                  },
              },
          }

          Path(os.environ["MANIFEST_PATH"]).write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Generate checksums
        run: |
          set -euo pipefail

          PDF_ASSET="${{ steps.vars.outputs.pdf_asset }}"
          MAGAZINE_PDF_ASSET="${{ steps.vars.outputs.magazine_pdf_asset }}"
          MAGAZINE_PRINT_PDF_ASSET="${{ steps.vars.outputs.magazine_print_pdf_asset }}"
          RELEASE_BUNDLE="${{ steps.vars.outputs.release_bundle }}"
          ARXIV_BUNDLE="${{ steps.vars.outputs.arxiv_bundle }}"
          MANIFEST_PATH="${{ steps.vars.outputs.manifest_path }}"
          RELEASE_MANIFEST_ASSET="${{ steps.vars.outputs.release_manifest_asset }}"
          PUBLICATION_METADATA_ASSET="${{ steps.vars.outputs.publication_metadata_asset }}"
          CHECKSUMS_PATH="${{ steps.vars.outputs.checksums_path }}"

          mkdir --parents "$(dirname "${CHECKSUMS_PATH}")"
          sha256sum \
            "${PDF_ASSET}" \
            "${MAGAZINE_PDF_ASSET}" \
            "${MAGAZINE_PRINT_PDF_ASSET}" \
            "${RELEASE_BUNDLE}" \
            "${ARXIV_BUNDLE}" \
            "${MANIFEST_PATH}" \
            "${RELEASE_MANIFEST_ASSET}" \
            "${PUBLICATION_METADATA_ASSET}" > "${CHECKSUMS_PATH}"

      - name: Validate Pages deployment wiring
        run: |
          set -euo pipefail
          pages_workflow=".github/workflows/pages.yml"
          grep -q "Deploy GitHub Pages" "${pages_workflow}"
          grep -q "docs/reflector.pdf" "${pages_workflow}"
          grep -q "docs/reflector-magazine.pdf" "${pages_workflow}"
          grep -q "docs/reflector-magazine-print.pdf" "${pages_workflow}"
          grep -q "docs/publication.json" "${pages_workflow}"

      - name: Generate Zenodo readiness report
        run: |
          set -euo pipefail

          VERSION_NO_V="${{ steps.vars.outputs.version_no_v }}"
          TAG="${{ steps.vars.outputs.tag }}"
          CHECKSUMS_PATH="${{ steps.vars.outputs.checksums_path }}"
          ZENODO_REPORT_PATH="${{ steps.vars.outputs.zenodo_report_path }}"

          VERSION_NO_V="${VERSION_NO_V}" TAG="${TAG}" CHECKSUMS_PATH="${CHECKSUMS_PATH}" ZENODO_REPORT_PATH="${ZENODO_REPORT_PATH}" python - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          version = os.environ["VERSION_NO_V"]
          tag = os.environ["TAG"]
          checksums_path = Path(os.environ["CHECKSUMS_PATH"])
          report_path = Path(os.environ["ZENODO_REPORT_PATH"])

          metadata = yaml.safe_load(Path("metadata/publication.yaml").read_text(encoding="utf-8"))
          zenodo = json.loads(Path(".zenodo.json").read_text(encoding="utf-8"))
          citation = yaml.safe_load(Path("CITATION.cff").read_text(encoding="utf-8"))

          checks = [
              ("metadata/publication.yaml version", str(metadata.get("version")) == version),
              (".zenodo.json version", str(zenodo.get("version")) == version),
              ("CITATION.cff version", str(citation.get("version")) == version),
              ("checksums.txt generated", checksums_path.exists()),
              ("ORCID present in .zenodo.json", bool((zenodo.get("creators") or [{}])[0].get("orcid"))),
          ]

          status = "ready" if all(ok for _, ok in checks) else "blocked"
          lines = [
              f"# Zenodo Readiness Report — {tag}",
              "",
              f"- Status: **{status}**",
              f"- Version: `{version}`",
              f"- Tag: `{tag}`",
              f"- Release URL: `https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/tag/{tag}`",
              f"- Source ZIP: `https://github.com/{os.environ['GITHUB_REPOSITORY']}/archive/refs/tags/{tag}.zip`",
              f"- Source TAR.GZ: `https://github.com/{os.environ['GITHUB_REPOSITORY']}/archive/refs/tags/{tag}.tar.gz`",
              "",
              "## Checks",
          ]
          for name, ok in checks:
              lines.append(f"- [{'x' if ok else ' '}] {name}")

          report_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          test -f "${{ steps.vars.outputs.pdf_asset }}"
          test -f "${{ steps.vars.outputs.magazine_pdf_asset }}"
          test -f "${{ steps.vars.outputs.magazine_print_pdf_asset }}"
          test -f "${{ steps.vars.outputs.release_bundle }}"
          test -f "${{ steps.vars.outputs.arxiv_bundle }}"
          test -f "${{ steps.vars.outputs.manifest_path }}"
          test -f "${{ steps.vars.outputs.release_manifest_asset }}"
          test -f "${{ steps.vars.outputs.publication_metadata_asset }}"
          test -f "${{ steps.vars.outputs.checksums_path }}"
          test -f "${{ steps.vars.outputs.zenodo_report_path }}"
          test -f "${{ steps.vars.outputs.release_notes_path }}"

          echo "=== Release artifact files ==="
          find release -maxdepth 5 -type f | sort

          echo ""
          echo "=== Release manifest ==="
          cat "${{ steps.vars.outputs.manifest_path }}"

      - name: Upload release workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.paper_name }}-release-assets-${{ steps.vars.outputs.tag }}
          path: |
            ${{ steps.vars.outputs.release_dir }}
            ${{ steps.vars.outputs.release_bundle }}
            ${{ steps.vars.outputs.arxiv_bundle }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.paper_name }}-${{ steps.vars.outputs.tag }}-build-artifacts
          path: |
            ${{ steps.vars.outputs.paper_dir }}/.cache/
            magazine/.cache/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

      - name: Check if GitHub Release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists. Skipping release creation to avoid race condition with publication.yml."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release ${TAG} does not exist. Proceeding with release creation."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.release_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.release_name }}
          generate_release_notes: true
          body_path: ${{ steps.vars.outputs.release_notes_path }}
          files: |
            ${{ steps.vars.outputs.pdf_asset }}
            ${{ steps.vars.outputs.magazine_pdf_asset }}
            ${{ steps.vars.outputs.magazine_print_pdf_asset }}
            ${{ steps.vars.outputs.release_bundle }}
            ${{ steps.vars.outputs.arxiv_bundle }}
            ${{ steps.vars.outputs.manifest_path }}
            ${{ steps.vars.outputs.release_manifest_asset }}
            ${{ steps.vars.outputs.publication_metadata_asset }}
            ${{ steps.vars.outputs.checksums_path }}
            ${{ steps.vars.outputs.zenodo_report_path }}
