name: REUSE Compliance

on:
  push:
    branches:
      - main
    paths:
      - "**/*.py"
      - "**/*.sh"
      - "**/*.tex"
      - "**/*.sty"
      - "**/*.cls"
      - "**/*.md"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
      - "**/*.toml"
      - "**/*.ts"
      - "**/*.js"
      - "LICENSES/**"
      - "REUSE.toml"
      - ".github/workflows/reuse.yml"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  reuse-lint:
    name: Validate REUSE compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v6
