name: "Copilot Setup Steps"

# Run when this file changes (for validation), and allow manual dispatch.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # This job name MUST be `copilot-setup-steps` — Copilot will not pick it up otherwise.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            # ----------------------------------------------------------------
            # TeXLive 2025 toolchain
            # ----------------------------------------------------------------
            # Install the packages required to build the reflector manuscript
            # locally with latexmk + pdflatex + biber, matching the TeXLive
            # version declared in 00README.json and used by CI.
            - name: Install TeXLive toolchain
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                      texlive-latex-base \
                      texlive-latex-recommended \
                      texlive-latex-extra \
                      texlive-bibtex-extra \
                      texlive-fonts-recommended \
                      texlive-fonts-extra \
                      biber \
                      latexmk

            # Confirm all required executables are available and report versions.
            - name: Validate TeXLive toolchain
              run: |
                  echo "=== latexmk ==="
                  latexmk --version

                  echo "=== pdflatex ==="
                  pdflatex --version

                  echo "=== biber ==="
                  biber --version

            # ----------------------------------------------------------------
            # Python toolchain
            # ----------------------------------------------------------------
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"

            - name: Install Python dependencies
              run: python -m pip install -e .
