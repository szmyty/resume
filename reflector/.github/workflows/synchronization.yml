name: Synchronization Validation

on:
  push:
    branches:
      - main
    paths:
      - "metadata/**"
      - "paper/**"
      - "specs/**"
      - "publication.json"
      - "release-manifest.json"
      - "CITATION.cff"
      - ".zenodo.json"
      - "scripts/validate-metadata.py"
      - "scripts/audit-publication-readiness.py"
      - "scripts/validate-build-reproducibility.py"
      - "scripts/validate-arxiv-packaging.py"
      - "scripts/validate-release-lifecycle.py"
      - ".github/workflows/synchronization.yml"
      - ".github/workflows/release-tag.yml"
      - ".github/workflows/release-paper.yml"

  pull_request:
    branches:
      - main
    paths:
      - "metadata/**"
      - "paper/**"
      - "specs/**"
      - "publication.json"
      - "release-manifest.json"
      - "CITATION.cff"
      - ".zenodo.json"
      - "scripts/validate-metadata.py"
      - "scripts/audit-publication-readiness.py"
      - "scripts/validate-build-reproducibility.py"
      - "scripts/validate-arxiv-packaging.py"
      - "scripts/validate-release-lifecycle.py"
      - ".github/workflows/synchronization.yml"
      - ".github/workflows/release-tag.yml"
      - ".github/workflows/release-paper.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-metadata:
    name: Validate Metadata Synchronization
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml>=6.0

      - name: Validate metadata consistency
        run: python scripts/validate-metadata.py

  validate-publication-readiness:
    name: Validate Publication Readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run publication readiness audit
        run: python scripts/audit-publication-readiness.py

      - name: Upload publication readiness report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publication-readiness-report
          path: audits/publication-readiness.md
          if-no-files-found: warn
          retention-days: 30

  validate-build-reproducibility:
    name: Validate Build Reproducibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate build reproducibility
        run: python scripts/validate-build-reproducibility.py

      - name: Upload build reproducibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reproducibility-report
          path: audits/build-reproducibility.md
          if-no-files-found: warn
          retention-days: 30

  validate-arxiv-packaging:
    name: Validate arXiv Packaging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate arXiv packaging
        run: python scripts/validate-arxiv-packaging.py

      - name: Upload arXiv validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arxiv-validation-report
          path: audits/arxiv-validation.md
          if-no-files-found: warn
          retention-days: 30

  validate-release-lifecycle:
    name: Validate Release Lifecycle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml>=6.0

      - name: Validate release lifecycle contracts
        run: python scripts/validate-release-lifecycle.py
