# REUSE.toml — REUSE 3.0 compliance configuration for the reflector repository.
#
# This file provides machine-readable copyright and license metadata for all
# files in the repository that do not carry inline SPDX headers.
#
# REUSE specification: https://reuse.software/spec/
# SPDX license list:   https://spdx.org/licenses/

version = 1

# ---------------------------------------------------------------------------
# Python source files
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.py",
    "**/*.pyi",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Shell scripts
# ---------------------------------------------------------------------------

[[annotations]]
path = ["**/*.sh"]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# GitHub Actions workflows and CI/CD configuration
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    ".github/workflows/*.yml",
    ".github/workflows/*.yaml",
    ".github/dependabot.yml",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# LaTeX source files
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.tex",
    "**/*.sty",
    "**/*.cls",
    "**/*.bib",
    ".latexmkrc",
    ".latexindent.yml",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Markdown documentation and specifications
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.md",
    "00-README.md",
    "README.md",
    "CHANGELOG.md",
    "CONTRIBUTING.md",
    "PROGRESS.md",
    "ROADMAP.md",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# YAML and TOML configuration files
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.yaml",
    "**/*.yml",
    "**/*.toml",
    ".pre-commit-config.yaml",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# JSON configuration and data files
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.json",
    ".commitlintrc.json",
    ".release-please-config.json",
    ".release-please-manifest.json",
    ".zenodo.json",
    "publication.json",
    "release-manifest.json",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Web and frontend files
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.html",
    "**/*.css",
    "**/*.js",
    "**/*.ts",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Root repository files and miscellaneous text files
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "LICENSE",
    "VERSION",
    "CITATION.cff",
    "pyproject.toml",
    ".editorconfig",
    ".gitignore",
    "**/*.txt",
    "**/*.cff",
    "**/*.cfg",
    "**/*.ini",
    "**/*.workspace",
    "**/.gitkeep",
    "*.workspace",
    "*.code-workspace",
    "reflector.code-workspace",
    ".devcontainer/Dockerfile",
    ".actrc",
    ".chktexrc",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Binary and image assets
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.png",
    "**/*.pdf",
    "**/*.jpg",
    "**/*.jpeg",
    "**/*.eps",
    "**/*.svg",
    "**/*.excalidraw",
    "**/*.gif",
    "**/*.webp",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Generated lockfiles and icon assets
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**/*.lock",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/npm-shrinkwrap.json",
    "**/yarn.lock",
    "**/Cargo.lock",
    "**/*.ico",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Generated audit and log files
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "audits/**",
    "**/*.log",
]
SPDX-FileCopyrightText = "2026 Alan Szmyt"
SPDX-License-Identifier = "Apache-2.0"
