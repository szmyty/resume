exclude: |
  (?x)^(
    .*\.lock|
    (.*/)?package-lock\.json|
    (.*/)?pnpm-lock\.yaml|
    (.*/)?npm-shrinkwrap\.json|
    .*\.ico
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.33.0
    hooks:
      - id: check-github-workflows

  - repo: local
    hooks:
      - id: validate-repository-metadata
        name: validate repository metadata
        entry: python scripts/validate-metadata.py
        language: python
        additional_dependencies:
          - pyyaml>=6.0
        pass_filenames: false

      - id: prevent-ds-store
        name: prevent .DS_Store files
        entry: ./scripts/prevent-ds-store.sh
        language: system
        pass_filenames: false

      - id: latexindent-format
        name: latexindent format (when available)
        entry: ./scripts/format-latex.sh
        language: system
        files: \.(tex|bib)$
