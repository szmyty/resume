    version_doi_url: "https://doi.org/10.5281/zenodo.20477044"
  doi:
    enabled: true
    provider: zenodo
    canonical_doi: "10.5281/zenodo.20477044"
    canonical_doi_url: "https://doi.org/10.5281/zenodo.20477044"
  huggingface:
    enabled: false
    space_url: null            # TODO: replace with Hugging Face Space URL when created
  implementation_repo:
