version: "3"

vars:
  PYTHON: '{{default "python3" .PYTHON}}'

tasks:
  default:
    desc: Show available development tasks
    cmds:
      - task: help

  help:
    desc: List available tasks
    cmds:
      - task --list

  setup:
    desc: Bootstrap local development environment and verify CLI
    deps:
      - install
    cmds:
      - task: doctor
      - task: version
      - |
        echo ""
        echo "✅ reflector setup complete."
        echo ""
        echo "Try:"
        echo "  task version"
        echo "  task test"
        echo "  task examples"
        echo "  uv run reflector --help"

  install:
    desc: Sync reflector and local development dependencies with uv
    cmds:
      - uv sync --all-extras

  version:
    desc: Print reflector CLI version
    cmds:
      - uv run reflector --version

  run:
    desc: Run reflector workflow in dry-run mode
    cmds:
      - uv run reflector run --dry-run

  doctor:
    desc: Diagnose local environment and CLI availability
    cmds:
      - |
        set -eu
        echo "reflector doctor"
        echo "---------------"
        uv --version
        uv run python --version
        uv run reflector --version
        uv run python -c "import reflector; print('✅ reflector package import OK')"
        if command -v latexmk >/dev/null 2>&1; then
          echo "✅ latexmk available"
        else
          echo "⚠️  latexmk not found (required for paper builds)"
        fi
        if command -v biber >/dev/null 2>&1; then
          echo "✅ biber available"
        else
          echo "⚠️  biber not found (required for bibliography builds)"
        fi

  _pytest:
    internal: true
    vars:
      PYTEST_ARGS: '{{default "" .PYTEST_ARGS}}'
    cmds:
      - |
        set +e
        uv run pytest {{.PYTEST_ARGS}}
        status=$?
        if [ "$status" -eq 5 ]; then
          echo "No tests discovered yet (pytest exit code 5: no tests collected)."
          exit 0
        fi
        exit "$status"

  test:
    desc: Run local test workflow
    cmds:
      - task: test-fast
      - task: test-unit
      - task: test-integration

  test-fast:
    desc: Run fast local tests
    cmds:
      - task: _pytest
        vars:
          PYTEST_ARGS: "-q --maxfail=1"

  test-unit:
    desc: Run unit tests
    cmds:
      - task: _pytest
        vars:
          PYTEST_ARGS: "-q"

  test-integration:
    desc: Run integration tests
    cmds:
      - task: _pytest
        vars:
          PYTEST_ARGS: "-q -m integration"

  test-ci:
    desc: Run CI-like local checks
    cmds:
      - task: lint
      - task: test

  lint:
    desc: Run repository lint and validation hooks
    cmds:
      - |
        if command -v pre-commit >/dev/null 2>&1; then
          pre-commit run --all-files
        else
          echo "pre-commit not found. Run 'task install' first."
          exit 1
        fi

  format:
    desc: Run LaTeX formatter hook (when available)
    cmds:
      - |
        if command -v pre-commit >/dev/null 2>&1; then
          pre-commit run latexindent-format --all-files
        else
          echo "pre-commit not found. Run 'task install' first."
          exit 1
        fi

  build:
    desc: Build the paper locally
    cmds:
      - ./scripts/build-paper.sh paper

  magazine:build:
    desc: Build the magazine digital PDF
    cmds:
      - ./scripts/build-magazine.sh build

  magazine:build:print:
    desc: Build the magazine print PDF
    cmds:
      - ./scripts/build-magazine.sh build-print

  magazine:clean:
    desc: Clean magazine build artifacts
    cmds:
      - ./scripts/build-magazine.sh clean

  magazine:doctor:
    desc: Validate magazine assets and tooling
    cmds:
      - ./scripts/build-magazine.sh doctor

  lint:paper:
    desc: Run ChkTeX linting on the paper source
    cmds:
      - ./scripts/lint-paper.sh paper

  audit:paper:
    desc: Generate ChkTeX audit report (audits/chktex-audit.md)
    cmds:
      - '{{.PYTHON}} scripts/audit-chktex.py --paper paper --output audits/chktex-audit.md'

  qa:paper:
    desc: Run full publication quality checks (build + lint + audit)
    cmds:
      - task: build
      - task: lint:paper
      - task: audit:paper
      - |
        echo ""
        echo "✅ Paper quality checks complete."
        echo "   Audit report: audits/chktex-audit.md"

  audit:
    desc: Run local repository audit commands
    cmds:
      - '{{.PYTHON}} scripts/validate-metadata.py'
      - '{{.PYTHON}} scripts/audit-publication-readiness.py'

  examples:
    desc: Run lightweight CLI examples for local experimentation
    aliases: [demo, sandbox]
    cmds:
      - uv run reflector --help
      - uv run reflector milestone --list
      - uv run reflector status
      - uv run reflector run --dry-run

  clean:
    desc: Remove local cache artifacts
    cmds:
      - |
        set -eu
        for cache_dir in paper/.cache .pytest_cache .mypy_cache .ruff_cache; do
          if [ -d "$cache_dir" ]; then
            rm -rf "$cache_dir"
          fi
        done

  act-test:
    desc: Run GitHub Actions synchronization workflow locally with act
    cmds:
      - act pull_request -W .github/workflows/synchronization.yml

  act-list:
    desc: List available GitHub Actions jobs for local act execution
    cmds:
      - act --list

  reuse:
    desc: Recursively apply SPDX headers to supported files.
    cmds:
      - >
        find . \
          -type f \
          \( \
            -name "*.py" -o \
            -name "*.md" -o \
            -name "*.tex" -o \
            -name "*.yml" -o \
            -name "*.yaml" -o \
            -name "*.json" -o \
            -name "*.sh" \
          \) \
          -not -path "./.git/*" \
          -not -path "./.cache/*" \
          -print0 | xargs -0 reuse annotate \
            --copyright "Alan Szmyt" \
            --license "Apache-2.0"

  reuse-lint:
    desc: Validate REUSE/SPDX compliance.
    cmds:
      - reuse lint

  reuse-lint-json:
    desc: Output REUSE lint results as JSON.
    cmds:
      - reuse lint --json

  reuse-spdx:
    desc: Print SPDX metadata summary.
    cmds:
      - reuse spdx

  reuse-fix:
    desc: Apply SPDX headers and validate compliance.
    cmds:
      - task reuse
      - task reuse-lint
