name: Build Resume

on:
  push:
    branches:
      - main
    paths:
      - "resume.tex"
      - "resume.sty"
      - "sections/**"
      - "profiles/**"
      - "assets/**"
      - "scripts/build.py"
      - "scripts/quality_gates.py"
      - ".latexmkrc"
      - ".github/workflows/build-resume.yml"

  pull_request:
    branches:
      - main
    paths:
      - "resume.tex"
      - "resume.sty"
      - "sections/**"
      - "profiles/**"
      - "assets/**"
      - "scripts/build.py"
      - "scripts/quality_gates.py"
      - ".latexmkrc"
      - ".github/workflows/build-resume.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Profiles and Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate profiles
        run: python scripts/quality_gates.py validate-profiles

      - name: Check placeholder content
        run: python scripts/quality_gates.py check-placeholders

      - name: Validation summary
        if: success()
        run: |
          {
            echo "## Profile and Content Validation"
            echo ""
            echo "- ✅ Profile definitions are valid."
            echo "- ✅ No unresolved placeholders were detected."
          } >> "${GITHUB_STEP_SUMMARY}"

  ats:
    name: ATS Extraction Validation
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build LaTeX PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: .
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -synctex=1
            -file-line-error
            -f
            -gg
            -cd
            -r
            .latexmkrc

      - name: Install PDF text extraction tool
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Copy PDF to outputs
        if: success()
        run: |
          mkdir -p outputs
          cp .cache/out/resume.pdf outputs/resume.pdf

      - name: Upload resume PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: outputs/resume.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Run ATS extraction smoke test
        run: >
          python scripts/quality_gates.py validate-ats
          --pdf outputs/resume.pdf
          --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Build summary
        if: success()
        run: |
          set -euo pipefail
          ARTIFACT_PATH="outputs/resume.pdf"
          SHA="$(sha256sum "${ARTIFACT_PATH}" | awk '{print $1}')"
          {
            echo "## Resume Build Summary"
            echo ""
            echo "| Artifact | Checksum (sha256) |"
            echo "| --- | --- |"
            echo "| resume.pdf | \`${SHA}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
